services:
  qdrant:
    image: qdrant/qdrant:v1.18.1
    container_name: IceBot-rag-qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ../data/qdrant:/qdrant/storage

  aspire-dashboard:
    image: ${ASPIRE_DASHBOARD_IMAGE:-mcr.microsoft.com/dotnet/aspire-dashboard:13}
    container_name: IceBot-tools-aspire-dashboard
    profiles:
      - observability
    ports:
      - "127.0.0.1:18888:18888"
      - "127.0.0.1:18889:18889"
    environment:
      ASPNETCORE_URLS: http://+:18888
      DOTNET_DASHBOARD_OTLP_ENDPOINT_URL: http://+:18889
